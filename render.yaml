# Render.com yayına alma tanımı (Blueprint) — Miracle Nail Art
# Tek servis: Express backend HEM /api'yi HEM derlenmiş Angular arayüzünü sunar.
# Kullanım: Render'da "New +" > "Blueprint" > bu repoyu seç. Aşağıdaki envVars'tan
# "sync: false" olanları (anahtarlar) Render panelinden elle girersin.
#
# NOT: Bu haliyle SQLite ile çalışır (hızlı MVP testi için). SQLite dosyası Render
# ücretsiz planda KALICI DEĞİLDİR (her yeniden dağıtımda sıfırlanır; admin ve
# tasarımlar açılışta yeniden oluşur). Gerçek/kalıcı veri için PostgreSQL'e geçiş:
# DEPLOY-REHBERI.md içindeki "PostgreSQL" bölümüne bak.

services:
  - type: web
    name: miracle-nailart
    runtime: node
    plan: free
    # Ön yüzü derle + backend bağımlılıkları + veritabanı şemasını kur
    buildCommand: npm install --include=dev && npm run build && cd server && npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: cd server && node index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "3000"
      # ÜRETİM modu — demo OTP/kod sızıntısı kapanır, CORS allowlist devreye girer,
      # zayıf JWT_SECRET ile başlatma DURUR, demo sipariş plan/kredi VERMEZ.
      - key: NODE_ENV
        value: "production"
      # Oturum güvenliği — Render rastgele üretir (16+ karakter). ELLE değiştirme.
      - key: JWT_SECRET
        generateValue: true
      # Uygulamanın herkese açık adresi (ödeme dönüşü + e-posta linkleri + CORS için) — ZORUNLU.
      # Kendi Render URL'inle değiştir (ör. https://miracle-nailart.onrender.com).
      - key: APP_URL
        sync: false
      # CORS izinli origin(ler) — virgülle ayır (özel alan adı eklersen). Boşsa APP_URL kullanılır.
      - key: ALLOWED_ORIGINS
        sync: false
      # Veritabanı — Neon Postgres (KALICI). Değeri Render panelinden elle girilir
      # (sync: false → şifre repoya YAZILMAZ; Environment sekmesinde tanımlanır).
      - key: DATABASE_URL
        sync: false
      # Ödeme (iyzico) — CANLI. Test için Render panelinden sandbox URI + sandbox anahtar gir.
      # CANLI tahsilat için: IYZICO_URI = https://api.iyzipay.com + gerçek anahtarlar.
      - key: IYZICO_URI
        value: "https://api.iyzipay.com"
      - key: IYZICO_API_KEY
        sync: false
      - key: IYZICO_SECRET
        sync: false
      # Gerçek AI (Flux) — Replicate token'ı elle gir (opsiyonel; yoksa demo)
      - key: REPLICATE_API_TOKEN
        sync: false
      # Gerçek AI (fal.ai / FLUX 1.1 Pro) — anahtar "id:secret"; Render panelinden elle gir
      - key: FAL_KEY
        sync: false
      # SMS (Twilio) — ÜRETİMDE ZORUNLU (yoksa OTP demo olur ve kod artık yanıtta DÖNMEZ → doğrulama yapılamaz).
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false
      # E-posta (Brevo HTTP API — Render'da SMTP portları kapalı olduğu için ÖNERİLEN yol).
      # Şifre sıfırlama + hesap silme onayı için ÜRETİMDE ZORUNLU.
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER
        sync: false
