<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miracle Nail Art — Intro</title>
<style>
  :root{
    --bg:#0c0a08; --panel:#16130f; --line:#2c2418;
    --gold:#d4af37; --gold-soft:#e9d9a0; --gold-deep:#b8912e;
    --gold-grad:linear-gradient(135deg,#f3e5a8,#d4af37 45%,#b8912e);
    --ink:#fff8e7; --muted:#b8ad97; --rose:#b76e79;
    --sans:"Segoe UI",Roboto,-apple-system,system-ui,sans-serif;
    --serif:"Georgia","Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden}
  .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1000px 600px at 50% 8%,#1c1510 0%,var(--bg) 60%);}

  /* progress + brand */
  .top{position:fixed;top:0;left:0;right:0;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;z-index:20}
  .brand{font-family:var(--serif);font-size:15px;letter-spacing:.5px;color:var(--gold-soft);opacity:.85}
  .brand b{background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .prog{position:fixed;top:0;left:0;height:3px;width:0;background:var(--gold-grad);z-index:21;transition:width .4s linear}

  /* layout: phone + caption */
  .scene{display:flex;gap:min(7vw,90px);align-items:center;max-width:1100px;padding:0 24px;opacity:0;transform:translateY(14px);transition:opacity .6s ease,transform .6s ease}
  .scene.show{opacity:1;transform:none}

  .phone{width:280px;flex:0 0 auto}
  .screen{position:relative;height:580px;border-radius:38px;overflow:hidden;background:var(--bg);
    border:1px solid #33302a;box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 8px #17140f;display:flex;flex-direction:column}
  .screen::before{content:"";position:absolute;top:10px;left:50%;transform:translateX(-50%);width:100px;height:22px;background:#000;border-radius:14px;z-index:9}
  .sbar{display:flex;justify-content:space-between;padding:13px 20px 6px;font-size:11px;color:var(--muted)}
  .pbody{flex:1;padding:6px 16px 0;overflow:hidden}
  .mininav{display:grid;grid-template-columns:repeat(6,1fr);padding:10px 2px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,#141019,#0c0a08);border-top:1px solid var(--line)}
  .mininav div{text-align:center;font-size:17px;opacity:.45;filter:grayscale(1);transition:.3s}
  .mininav div.on{opacity:1;filter:none;transform:translateY(-2px)}
  .mininav div.on::after{content:"";display:block;width:5px;height:5px;border-radius:50%;background:var(--gold);margin:3px auto 0}

  .pt{font-family:var(--serif);font-size:21px;margin:4px 0 2px}
  .psub{color:var(--muted);font-size:11px;margin-bottom:14px}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:11px}
  .hand{display:flex;gap:5px;justify-content:center;align-items:flex-end;height:84px}
  .nail{width:21px;border-radius:11px 11px 7px 7px;position:relative;box-shadow:inset 0 -6px 10px rgba(0,0,0,.35);transition:height .5s ease, background .6s ease}
  .nail::after{content:"";position:absolute;top:5px;left:4px;width:6px;height:40%;border-radius:6px;background:rgba(255,255,255,.45)}
  .n1{height:54px}.n2{height:66px}.n3{height:74px}.n4{height:65px}.n5{height:48px}
  .pbtn{text-align:center;padding:12px;border-radius:24px;font-weight:700;font-size:13px;background:var(--gold-grad);color:#1a1405;box-shadow:0 8px 22px rgba(212,175,55,.3)}
  .prow{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);margin:4px 2px 10px}
  .ppill{font-size:10px;padding:3px 9px;border-radius:12px;background:#000;border:1px solid var(--gold-deep);color:var(--gold-soft)}
  .chip{display:inline-block;padding:6px 12px;border:1px solid var(--line);border-radius:20px;font-size:11px;color:var(--muted);background:#000;margin-right:5px}
  .chip.on{border-color:var(--gold);color:var(--gold-soft);background:linear-gradient(180deg,#221c0c,#151109)}
  .swatch{width:26px;height:26px;border-radius:50%;border:2px solid #000;box-shadow:0 0 0 1px var(--line)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .tile{height:70px;border-radius:14px;border:1px solid var(--line)}
  .plan{background:linear-gradient(180deg,#1b1710,#121014);border:1px solid var(--line);border-radius:14px;padding:11px;margin-bottom:8px;position:relative}
  .plan.best{border-color:var(--gold)}
  .plan .bt{position:absolute;right:9px;top:-8px;font-size:9px;background:var(--gold);color:#1a1405;padding:2px 8px;border-radius:10px;font-weight:800}
  .price{font-family:var(--serif);font-size:20px}.price small{font-size:10px;color:var(--muted)}
  .avatar{width:58px;height:58px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:25px;color:#1a1405;background:var(--gold-grad)}
  .mrow{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line);font-size:13px}
  .mrow span:first-child{width:20px;text-align:center;font-size:15px}

  /* caption side */
  .cap{max-width:420px}
  .cap .eyebrow{letter-spacing:.34em;font-size:12px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
  .cap h2{font-family:var(--serif);font-weight:600;font-size:clamp(26px,3.4vw,40px);line-height:1.15;
    background:linear-gradient(100deg,#fff 20%,var(--gold-soft) 70%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .cap p{color:var(--muted);font-size:17px;line-height:1.6;margin-top:16px}

  /* intro scene (full logo) */
  .intro{text-align:center}
  .intro .logo{font-family:var(--serif);font-size:clamp(40px,7vw,74px);letter-spacing:.5px;
    background:linear-gradient(100deg,#fff 8%,var(--gold-soft) 45%,var(--gold) 80%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .intro .tag{color:var(--muted);font-size:clamp(15px,2vw,20px);margin-top:16px;letter-spacing:.05em}
  .intro .hand{height:120px;margin:34px auto 0}
  .intro .nail{width:30px}

  /* start / controls overlay */
  .overlay{position:fixed;inset:0;background:radial-gradient(800px 500px at 50% 40%,#1a1410,#0a0806);
    display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:40;text-align:center;padding:24px}
  .overlay .logo{font-family:var(--serif);font-size:clamp(38px,7vw,66px);
    background:linear-gradient(100deg,#fff,var(--gold-soft) 50%,var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .overlay p{color:var(--muted);margin:14px 0 30px;font-size:16px}
  .play{border:none;cursor:pointer;padding:16px 40px;border-radius:40px;font-size:17px;font-weight:800;
    background:var(--gold-grad);color:#1a1405;box-shadow:0 12px 30px rgba(212,175,55,.35);display:flex;align-items:center;gap:10px}
  .hint{color:#7d7768;font-size:12px;margin-top:18px}
  .ctrl{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:20;opacity:0;transition:.4s}
  .ctrl.show{opacity:1}
  .ctrl button{background:#17140f;border:1px solid var(--line);color:var(--gold-soft);border-radius:22px;padding:9px 18px;font-size:13px;cursor:pointer}
  @media(max-width:820px){.scene{flex-direction:column;gap:26px}.phone{width:230px}.screen{height:480px}.cap{text-align:center}}
</style>
</head>
<body>

<div class="prog" id="prog"></div>
<div class="top"><div class="brand"><b>Miracle Nail Art</b> · AI</div><div class="brand" id="clock" style="opacity:.5"></div></div>

<div class="stage" id="stage"></div>

<div class="ctrl" id="ctrl">
  <button onclick="tour.replay()">↺ Replay</button>
  <button onclick="tour.toggle()" id="pp">⏸ Pause</button>
</div>

<div class="overlay" id="overlay">
  <div class="logo">Miracle Nail Art</div>
  <p>An AI-powered nail studio — product tour with English narration</p>
  <button class="play" onclick="tour.start()">▶ &nbsp;Play the tour</button>
  <div class="hint">Best with sound on 🔊 — narration uses your browser's English voice.</div>
</div>

<script>
// ---------- scene builders (visuals) ----------
function nav(active){
  const t=['🏠','🔍','🤚','🎨','🛍️','👤'];
  return '<div class="mininav">'+t.map((x,i)=>`<div class="${i===active?'on':''}">${x}</div>`).join('')+'</div>';
}
function screen(active, inner){
  return `<div class="phone"><div class="screen"><div class="sbar"><span>9:41</span><span>✦ ⬤ 100%</span></div>
    <div class="pbody">${inner}</div>${nav(active)}</div></div>`;
}
const nailsRose = `<div class="hand">
  <div class="nail n1" style="background:linear-gradient(180deg,#e8b4b8,#b76e79)"></div>
  <div class="nail n2" style="background:linear-gradient(180deg,#e8b4b8,#b76e79)"></div>
  <div class="nail n3" style="background:linear-gradient(180deg,#f0d8b0,#c9a24a)"></div>
  <div class="nail n4" style="background:linear-gradient(180deg,#e8b4b8,#b76e79)"></div>
  <div class="nail n5" style="background:linear-gradient(180deg,#e8b4b8,#b76e79)"></div></div>`;
const nailsRed = `<div class="hand" style="height:96px">
  <div class="nail n1" style="background:linear-gradient(180deg,#ff6b6b,#8b1e2d)"></div>
  <div class="nail n2" style="background:linear-gradient(180deg,#ff7a7a,#8b1e2d)"></div>
  <div class="nail n3" style="background:linear-gradient(180deg,#ff8585,#961f2f)"></div>
  <div class="nail n4" style="background:linear-gradient(180deg,#ff7a7a,#8b1e2d)"></div>
  <div class="nail n5" style="background:linear-gradient(180deg,#ff6b6b,#8b1e2d)"></div></div>`;
const nailsNude = `<div class="hand" style="height:66px">
  ${[1,2,3,4,5].map(i=>`<div class="nail n${i}" style="background:linear-gradient(180deg,#efe3d4,#cdb7a3)"></div>`).join('')}</div>`;

const SCENES = [
  { // 0 intro
    eyebrow:'', html:`<div class="intro">
      <div class="logo">Miracle Nail Art</div>
      <div class="tag">Your personal AI nail studio — in your pocket</div>
      ${nailsRose}
    </div>`,
    say:"Meet Miracle Nail Art — your personal, A.I. powered nail studio, right in your pocket.", hold:1200 },

  { // 1 home
    nav:0, eyebrow:'Home', h2:'It knows what suits you', p:'The moment you open the app, your home screen greets you with nail designs hand-picked for your skin tone.',
    screen:screen(0, `<div class="pt">Hello Leman ✨</div><div class="psub">Today's inspiration, chosen for your skin tone</div>
      <div class="pcard" style="background:linear-gradient(135deg,#231a0c,#12100a);border-color:var(--gold-deep)">${nailsRose}
        <div class="prow" style="margin-top:10px"><span style="color:var(--ink)">Rose Quartz & Gold · 94%</span><span class="ppill">Try ▸</span></div></div>
      <div class="pbtn">✨ Create with AI</div>`),
    say:"It starts the moment you open the app. Your home screen greets you with nail designs, hand-picked for your skin tone.", hold:900 },

  { // 2 studio
    nav:3, eyebrow:'AI Studio', h2:'Describe it. See it.', p:'Just type the look you dream of. Our A.I. turns your words into a stunning nail design in seconds.',
    screen:screen(3, `<div class="pt">Studio</div><div class="psub">Type your dream, let AI paint it</div>
      <div class="pcard" style="display:flex;align-items:center;gap:8px;padding:11px"><span style="color:var(--muted);font-size:12px">✎ red glitter night nails…</span></div>
      <div style="margin-bottom:10px"><span class="chip on">Glitter</span><span class="chip">Matte</span><span class="chip">Chrome</span></div>
      <div class="pcard" style="text-align:center;background:linear-gradient(180deg,#1a1216,#0e0b0d)">${nailsRed}</div>
      <div class="prow"><span>Image credits left</span><span class="ppill">27 / 30</span></div>
      <div class="pbtn">✨ Generate</div>`),
    say:"In the Studio, just describe the look you dream of. Our A.I. turns your words into a stunning nail design in seconds.", hold:900 },

  { // 3 scan
    nav:2, eyebrow:'Hand Analysis', h2:'Scan. Get matched.', p:'Not sure what flatters you? Scan your hand. We read your skin tone and nail shape, then suggest your most flattering colors.',
    screen:screen(2, `<div class="pt">Your Hand</div><div class="psub">Show your hand, we'll do the rest</div>
      <div class="pcard"><div style="display:flex;gap:12px;align-items:center"><div class="swatch" style="background:#e7c2a0"></div>
        <div><div style="font-size:13px">Skin tone · Warm / Peach</div><div style="color:var(--muted);font-size:10px">ITA 41° · undertone: gold</div></div></div></div>
      <div class="pcard"><div style="font-size:13px;margin-bottom:8px">Nail shape · <b style="color:var(--gold-soft)">Almond</b></div>${nailsNude}</div>
      <div class="psub" style="margin:2px 0 7px">Colors that flatter you</div>
      <div style="display:flex;justify-content:space-between;padding:0 6px">
        <div class="swatch" style="background:#b76e79"></div><div class="swatch" style="background:#c9a24a"></div>
        <div class="swatch" style="background:#7d5a4f"></div><div class="swatch" style="background:#2f6b5e"></div>
        <div class="swatch" style="background:#843b4a"></div></div>`),
    say:"Not sure what suits you? Scan your hand. We read your skin tone and nail shape, then suggest the colors that flatter you most.", hold:900 },

  { // 4 shop
    nav:4, eyebrow:'Membership', h2:'A plan that grows with you', p:'Choose monthly, yearly, or pro — with more image credits as you create more.',
    screen:screen(4, `<div class="pt">Membership</div><div class="psub">Upgrade anytime, add extra credits</div>
      <div class="plan"><div style="display:flex;justify-content:space-between;align-items:baseline"><div style="font-size:13px">Monthly</div><div class="price">₺149<small>/mo</small></div></div><div style="color:var(--muted);font-size:11px;margin-top:3px">30 images per month</div></div>
      <div class="plan best"><div class="bt">MOST POPULAR</div><div style="display:flex;justify-content:space-between;align-items:baseline"><div style="font-size:13px;color:var(--gold-soft)">Yearly</div><div class="price">₺119<small>/mo</small></div></div><div style="color:var(--muted);font-size:11px;margin-top:3px">30 / month · 360 images a year</div></div>
      <div class="plan"><div style="display:flex;justify-content:space-between;align-items:baseline"><div style="font-size:13px">Pro</div><div class="price">₺349<small>/mo</small></div></div><div style="color:var(--muted);font-size:11px;margin-top:3px">100 images per month</div></div>`),
    say:"Choose the plan that fits you. Monthly, yearly, or pro — with more image credits as you grow.", hold:900 },

  { // 5 profile
    nav:5, eyebrow:'Your Account', h2:'Everything in one place', p:'Your plan, your remaining credits and your settings — kept safe with phone verification.',
    screen:screen(5, `<div style="text-align:center;padding:8px 0 4px"><div class="avatar">L</div>
      <div style="font-family:var(--serif);font-size:17px;margin-top:8px">Leman</div><div style="color:var(--muted);font-size:11px">l.shalili@logper.com</div></div>
      <div class="pcard" style="background:linear-gradient(135deg,#231a0c,#12100a);border-color:var(--gold-deep)">
        <div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:12px;color:var(--gold-soft)">Yearly Premium</div><div style="color:var(--muted);font-size:10px">312 days left</div></div><span class="ppill">27 credits</span></div></div>
      <div class="mrow"><span>❤️</span> Favorites</div><div class="mrow"><span>💎</span> Subscription</div>
      <div class="mrow"><span>⚙️</span> Settings</div><div class="mrow" style="border:none"><span>🚪</span> Sign out</div>`),
    say:"Your profile keeps everything in one place — your plan, your remaining credits, and your settings, secured with phone verification.", hold:900 },

  { // 6 outro
    eyebrow:'', html:`<div class="intro">
      <div class="logo">Miracle Nail Art</div>
      <div class="tag">Your nails, reimagined by A.I.</div>
      <div style="margin-top:30px"><span class="pbtn" style="display:inline-block;padding:14px 34px">Try it today ✨</span></div>
    </div>`,
    say:"Miracle Nail Art. Your nails, reimagined by A.I. Try it today.", hold:1600 },
];

// ---------- tour engine ----------
const tour = (function(){
  const stage=document.getElementById('stage'), prog=document.getElementById('prog'),
        overlay=document.getElementById('overlay'), ctrl=document.getElementById('ctrl'), pp=document.getElementById('pp');
  let i=0, paused=false, timer=null, voice=null, playing=false;

  function pickVoice(){
    const vs=speechSynthesis.getVoices().filter(v=>/en(-|_)?(US|GB|AU)?/i.test(v.lang));
    voice = vs.find(v=>/female|aria|jenny|samantha|zira|google us/i.test(v.name)) || vs.find(v=>/US/i.test(v.lang)) || vs[0] || null;
  }
  if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }

  function render(s){
    stage.innerHTML='';
    const el=document.createElement('div'); el.className='scene';
    if(s.html){ el.innerHTML=s.html; }
    else {
      el.innerHTML = s.screen + `<div class="cap">${s.eyebrow?`<div class="eyebrow">${s.eyebrow}</div>`:''}
        <h2>${s.h2}</h2><p>${s.p}</p></div>`;
    }
    stage.appendChild(el);
    requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  }

  function speak(text, onend){
    if(!('speechSynthesis' in window)){ onend(); return; }
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    if(voice) u.voice=voice;
    u.lang='en-US'; u.rate=.98; u.pitch=1.0;
    u.onend=onend; u.onerror=onend;
    speechSynthesis.speak(u);
  }

  function step(){
    if(i>=SCENES.length){ finish(); return; }
    prog.style.width = ((i+1)/SCENES.length*100)+'%';
    const s=SCENES[i];
    render(s);
    // let entrance play, then speak; advance on speech end + hold
    timer=setTimeout(()=>{
      speak(s.say, ()=>{
        if(paused) return;
        timer=setTimeout(()=>{ i++; step(); }, s.hold||800);
      });
    }, 650);
  }

  function finish(){ prog.style.width='100%'; }

  return {
    start(){
      overlay.style.display='none'; ctrl.classList.add('show');
      playing=true; i=0; paused=false;
      // warm up speech engine (some browsers need a first utterance on gesture)
      if('speechSynthesis' in window){ try{ speechSynthesis.resume(); }catch(e){} }
      step();
    },
    replay(){ clearTimeout(timer); if('speechSynthesis' in window) speechSynthesis.cancel(); i=0; paused=false; pp.textContent='⏸ Pause'; step(); },
    toggle(){
      paused=!paused; pp.textContent=paused?'▶ Resume':'⏸ Pause';
      if(paused){ clearTimeout(timer); if('speechSynthesis' in window) speechSynthesis.pause(); }
      else { if('speechSynthesis' in window) speechSynthesis.resume();
        // if speech already ended while paused, nudge forward
      }
    }
  };
})();

// live clock in status
setInterval(()=>{ const d=new Date(); document.getElementById('clock').textContent=d.toTimeString().slice(0,5); },1000);
</script>
</body>
</html>
