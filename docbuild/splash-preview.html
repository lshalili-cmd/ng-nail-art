<!DOCTYPE html>
<html lang="tr"><head><meta charset="UTF-8">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:440px;height:900px;overflow:hidden;background:#000;font-family:"Segoe UI",system-ui,sans-serif}
  .splash{position:relative;width:440px;height:900px;background:radial-gradient(120% 80% at 50% 30%,#141009,#000 70%);overflow:hidden;
    display:flex;flex-direction:column;align-items:center}
  /* gunes isinlari */
  .rays{position:absolute;inset:0;
    background:repeating-conic-gradient(from 0deg at 50% 34%,
      rgba(212,175,55,0) 0deg 3.4deg, rgba(212,175,55,.34) 3.4deg 3.9deg);
    -webkit-mask:radial-gradient(circle at 50% 34%, transparent 96px, #000 130px, #000 380px, transparent 560px);
            mask:radial-gradient(circle at 50% 34%, transparent 96px, #000 130px, #000 380px, transparent 560px);}
  /* amblem */
  .emblem{position:absolute;top:34%;left:50%;transform:translate(-50%,-50%);width:250px;height:250px;
    border:1.5px solid rgba(212,175,55,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle,rgba(20,15,8,.6),transparent 72%)}
  .emblem svg{width:170px;height:200px}
  /* deco zigzag */
  .deco{position:absolute;top:calc(34% + 165px);left:50%;transform:translateX(-50%);width:200px}
  /* metin */
  .brand{position:absolute;top:58%;left:0;right:0;text-align:center}
  .kicker{letter-spacing:.5em;font-size:15px;color:#b89a52;text-indent:.5em;margin-bottom:18px}
  .name{font-family:Georgia,"Times New Roman",serif;font-size:78px;line-height:1;
    background:linear-gradient(180deg,#fbe6a8,#d4af37 55%,#a97e22);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .tag{font-family:Georgia,serif;font-style:italic;font-size:19px;color:#d9b45a;margin-top:16px;letter-spacing:.05em}
  .divider{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;color:#a9832b}
  .divider .ln{width:70px;height:1px;background:linear-gradient(90deg,transparent,#a9832b)}
  .divider .ln.r{background:linear-gradient(90deg,#a9832b,transparent)}
  .sparkles{position:absolute;inset:0;pointer-events:none;z-index:2}
  .sp{position:absolute;color:#f3e0a0;line-height:1;text-shadow:0 0 8px rgba(212,175,55,.85);opacity:0;animation:tw 2.6s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1)}}
  .hint{position:absolute;bottom:32px;left:0;right:0;text-align:center;color:#6b5a30;font-size:12px;letter-spacing:.2em}
</style></head>
<body>
  <div class="splash">
    <div class="rays"></div>
    <div class="sparkles"><span class="sp" style="left:15%;top:12%;font-size:13px;animation-delay:0s">✦</span><span class="sp" style="left:82%;top:17%;font-size:17px;animation-delay:0.6s">✦</span><span class="sp" style="left:28%;top:26%;font-size:9px;animation-delay:1.2s">✦</span><span class="sp" style="left:70%;top:30%;font-size:12px;animation-delay:0.3s">✦</span><span class="sp" style="left:50%;top:8%;font-size:15px;animation-delay:0.9s">✦</span><span class="sp" style="left:88%;top:45%;font-size:10px;animation-delay:1.5s">✦</span><span class="sp" style="left:12%;top:41%;font-size:13px;animation-delay:0.4s">✦</span><span class="sp" style="left:35%;top:64%;font-size:11px;animation-delay:1.1s">✦</span><span class="sp" style="left:78%;top:68%;font-size:16px;animation-delay:0.2s">✦</span><span class="sp" style="left:20%;top:77%;font-size:9px;animation-delay:1.8s">✦</span><span class="sp" style="left:61%;top:83%;font-size:13px;animation-delay:0.7s">✦</span><span class="sp" style="left:90%;top:80%;font-size:10px;animation-delay:1.3s">✦</span><span class="sp" style="left:8%;top:60%;font-size:11px;animation-delay:2.0s">✦</span><span class="sp" style="left:46%;top:90%;font-size:12px;animation-delay:1.6s">✦</span></div>

    <div class="emblem">
      <svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="0.3" y2="1">
            <stop offset="0" stop-color="#fbeaa8"/><stop offset="0.5" stop-color="#d9b141"/><stop offset="1" stop-color="#a5791f"/>
          </linearGradient>
        </defs>
        <!-- pirlanta -->
        <path d="M64 26 L136 26 L162 54 L100 128 L38 54 Z" fill="url(#g)"/>
        <g stroke="#8a6410" stroke-width="1.4" fill="none" opacity=".55" stroke-linejoin="round">
          <path d="M38 54 L162 54"/><path d="M64 26 L84 54 L100 128"/><path d="M136 26 L116 54 L100 128"/><path d="M84 54 L116 54"/>
        </g>
        <path d="M74 38 l3.2 8.6 8.6 3.2 -8.6 3.2 -3.2 8.6 -3.2 -8.6 -8.6 -3.2 8.6 -3.2 z" fill="#fff8e7"/>
        <!-- parlak tirnak -->
        <path d="M78 150 C82 138 118 138 122 150 C140 182 128 246 100 262 C72 246 60 182 78 150 Z" fill="url(#g)"/>
        <ellipse cx="88" cy="188" rx="7" ry="34" fill="#fff8e7" opacity=".5" transform="rotate(-10 88 188)"/>
      </svg>
    </div>

    <div class="deco">
      <svg viewBox="0 0 200 16" width="200" height="16" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 2 L12 14 L24 2 L36 14 L48 2 L60 14 L72 2 L84 14 L96 2 L104 10 L112 2 L124 14 L136 2 L148 14 L160 2 L172 14 L184 2 L196 14"
          fill="none" stroke="#a9832b" stroke-width="2"/>
      </svg>
    </div>

    <div class="brand">
      <div class="kicker">NAIL ART AI</div>
      <div class="name">miracle</div>
      <div class="tag">◇&nbsp;&nbsp;size özel tasarımlar&nbsp;&nbsp;◇</div>
    </div>

    <div class="divider"><span class="ln"></span>◇<span class="ln r"></span></div>
    <div class="hint">DOKUN ▸</div>
  </div>
</body></html>
